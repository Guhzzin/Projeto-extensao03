<body>
    <div class="d-flex justify-content-center align-items-center vh-100 p-3">
       <div class="login-card">
        <h2 class="fw-bold text-center mb-4">Login</h2>

        <form action="login.php" method="POST">
            <div class="input-group mb-3"> <!-- Usuario -->
                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                <input type="text" class="form-control" placeholder="Usuário" name="username" required>
            </div>

             <div class="input-group mb-3"> <!-- Senha -->
                <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                <input type="password" class="form-control" placeholder="Senha" name="password" required>
            </div>

            <div class="d-flex justify-content-center align-items-center mb-3">
                <div>
                    <input type="checkbox" class="form-check-input" id="remember"> <!-- Lembrar-me e esqueceu a senha -->
                    <label class="form-check-label" for="remember">Lembrar-me</label>
                </div>
                <a href="#" class="text-white small text-decoration-none ms-4">Esqueceu a senha?</a>
            </div>

            <button class="btn btn-light w-100 text-dark fw-semibold" type="submit"> <!-- Botão de login -->
                Entrar
            </button>

             <!-- Link para cadastro -->
            <p class="cadastro-link"><a href="#" class="text-white fw-semibold text-decoration-none">Não tem uma conta? Cadastre-se aqui</a></p>
        </form>

       </div>
