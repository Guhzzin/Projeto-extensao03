version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
    - ./public:/var/www/html 
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meu_banco
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./dados_do_banco:/var/lib/mysql
      
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pma_projeto
    ports:
      - "8081:80"
    environment:
      # MUITO IMPORTANTE: O host deve ser o nome do seu serviço de banco (db)
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db