version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html 
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always  # Adicionado para ele tentar subir se falhar
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meu_banco
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql # <-- MUDANÇA AQUI: Usando volume nomeado
      
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pma_projeto
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

# Define o volume nomeado para o Docker gerenciar as permissões sozinho
volumes:
  db_data: