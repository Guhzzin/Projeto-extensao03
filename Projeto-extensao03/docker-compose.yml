version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
    - ./public:/var/www/html 
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meu_banco
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql